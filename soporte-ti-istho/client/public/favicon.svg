      <circle cx="5" cy="24" r="5.5" fill="black"/>
      <circle cx="43" cy="24" r="5.5" fill="black"/>
    </mask>
  </defs>
  <!-- Fondo navy redondeado -->
  <rect width="48" height="48" rx="10" fill="#1B2340"/>
