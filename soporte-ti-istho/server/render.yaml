# render.yaml — Render Blueprint para SIST backend
# Documentación: https://render.com/docs/blueprint-spec
#
# Almacenamiento de archivos adjuntos: Cloudinary (sin Disk requerido).
# Base de datos MySQL externa: Aiven o TiDB Cloud.

services:
  - type: web
    name: sist-backend
    runtime: node
    rootDir: soporte-ti-istho/server
    buildCommand: npm install
    startCommand: npm run db:migrate && npm start
    healthCheckPath: /api/health
    # Plan Free: se suspende tras 15 min de inactividad (cold start ~30s).
    # Plan Starter ($7/mes): siempre activo, sin cold starts.
    plan: free
    autoDeploy: true

    envVars:
      - key: NODE_ENV
        value: production

      # Render inyecta PORT automáticamente — no definir manualmente.

      # DATABASE_URL lo provee el proveedor MySQL externo.
      # Aiven:    mysql://avnadmin:<pass>@<host>.aivencloud.com:PORT/defaultdb?ssl-mode=REQUIRED
      # TiDB:     mysql://user:<pass>@<host>:4000/dbname?ssl-mode=VERIFY_IDENTITY
      - key: DATABASE_URL
        sync: false

      - key: JWT_SECRET
        generateValue: true

      - key: JWT_EXPIRES_IN
        value: 24h

      - key: MAX_FILE_SIZE
        value: "10485760"

      # URL del frontend en Vercel. Separar con coma para múltiples orígenes:
      # https://mi-app.vercel.app,http://localhost:5173
      - key: CORS_ORIGIN
        sync: false

      # ── Cloudinary ──────────────────────────────────────────────────────────
      - key: CLOUDINARY_CLOUD_NAME
        sync: false

      - key: CLOUDINARY_API_KEY
        sync: false

      - key: CLOUDINARY_API_SECRET
        sync: false

      # ── Email ───────────────────────────────────────────────────────────────
      - key: EMAIL_HOST
        sync: false

      - key: EMAIL_PORT
        value: "587"

      - key: EMAIL_SECURE
        value: "false"

      - key: EMAIL_USER
        sync: false

      - key: EMAIL_PASS
        sync: false

      - key: EMAIL_FROM
        sync: false
